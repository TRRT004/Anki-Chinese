version: "3.9"

services:
  anki-sync:
    build: .
    env_file: .env
    environment:
      - OUTPUT_DIR=/output
      - ANKI_COLLECTION_PATH=/collection
    volumes:
      - ./output:/output
      - anki-collection:/collection   # persistent collection for ankiweb backend
    restart: unless-stopped           # survive reboots; stop only on explicit `docker compose down`

volumes:
  anki-collection:   # survives image rebuilds; only diffs sent to AnkiWeb each run
